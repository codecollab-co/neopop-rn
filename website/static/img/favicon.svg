<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Front face — electric blue -->
  <rect x="4" y="4" width="32" height="32" fill="#0066FF"/>
  <!-- Right face — darker blue (depth) -->
  <polygon points="36,4 44,12 44,44 36,36" fill="#0047b3"/>
  <!-- Bottom face — darkest blue (ground) -->
  <polygon points="4,36 36,36 44,44 12,44" fill="#003a94"/>
  <!-- 'N' letterform — white, clean -->
  <text x="8" y="28" font-family="'Outfit','Inter',system-ui,sans-serif" font-size="20" font-weight="800" fill="#ffffff">N</text>
</svg>
